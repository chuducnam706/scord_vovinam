<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chia sân đối kháng</title>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; font-family: Arial, sans-serif; background: #101114; color: #f7f7f2; }
      header { display: flex; justify-content: space-between; gap: 14px; padding: 18px 22px; background: #181a20; border-bottom: 1px solid #333741; }
      h1, p { margin: 0; }
      h1 { font-size: 30px; }
      main { display: grid; gap: 14px; padding: 16px; }
      .muted { color: #a8adb7; line-height: 1.35; }
      .actions, .toolbar, .assignment-cell { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
      .toolbar { justify-content: space-between; padding: 12px; border: 1px solid #333741; border-radius: 8px; background: #181a20; }
      a, button { display: inline-grid; place-items: center; min-height: 40px; padding: 0 12px; border: 0; border-radius: 7px; background: #237083; color: #fff; font-size: 14px; font-weight: 900; text-decoration: none; cursor: pointer; }
      button:disabled { opacity: .55; cursor: not-allowed; }
      .secondary { background: #3a404c; }
      .success { background: #2f7d4e; }
      select { min-height: 40px; min-width: 120px; padding: 0 10px; border: 1px solid #3a404c; border-radius: 7px; background: #101114; color: #f7f7f2; }
      .status { padding: 12px 14px; border: 1px solid #333741; border-radius: 8px; background: #181a20; }
      .status.ok { border-color: #2f7d4e; background: #132719; color: #dff6e6; }
      .status.error { border-color: #a83232; background: #311616; color: #ffe1e1; }
      .summary { color: #a8adb7; font-weight: 900; }
      .table-wrap { overflow: auto; border: 1px solid #333741; border-radius: 8px; background: #181a20; }
      table { width: 100%; min-width: 1080px; border-collapse: collapse; }
      th, td { padding: 12px; border-bottom: 1px solid #2a2f39; text-align: left; vertical-align: middle; }
      th { position: sticky; top: 0; background: #22252d; }
      tr.assigned { background: #14232a; }
      .badge { display: inline-grid; place-items: center; min-width: 76px; min-height: 30px; padding: 0 10px; border-radius: 999px; background: #8a6a1f; color: #fff; font-size: 13px; font-weight: 900; }
      .badge.assigned { background: #237083; }
      .fighter-name { font-weight: 900; }
      @media (max-width: 760px) { header, .toolbar { display: grid; } }
    </style>
  </head>
  <body>
    <header>
      <div>
        <h1>Chia sân đối kháng</h1>
        <p class="muted">Gán từng trận đỏ/xanh vào 6 sân. Thứ tự chạy vẫn theo Excel gốc.</p>
      </div>
      <div class="actions">
        <a class="secondary" href="/combat-import.html">Import đối kháng</a>
        <a class="secondary" href="/arena.html">Điều phối sân</a>
        <a class="secondary" href="/">Dashboard</a>
      </div>
    </header>

    <main>
      <div class="status" id="status">Đang tải danh sách đối kháng...</div>
      <section class="toolbar">
        <div class="actions">
          <select id="bulkCourtSelect">
            <option value="">Gán tất cả</option>
            <option value="1">Vào sân 1</option>
            <option value="2">Vào sân 2</option>
            <option value="3">Vào sân 3</option>
            <option value="4">Vào sân 4</option>
            <option value="5">Vào sân 5</option>
            <option value="6">Vào sân 6</option>
            <option value="clear">Bỏ gán tất cả</option>
          </select>
          <button class="secondary" id="applyBulkButton" type="button">Áp dụng</button>
          <button class="success" id="saveAllButton" type="button" disabled>Lưu tất cả</button>
        </div>
        <div class="summary" id="summary">—</div>
      </section>

      <section class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>STT</th>
              <th>Loại trận</th>
              <th>Hạng cân</th>
              <th>Đỏ</th>
              <th>Xanh</th>
              <th>Sân</th>
              <th>Hành động</th>
            </tr>
          </thead>
          <tbody id="rows"><tr><td colspan="7">Đang tải...</td></tr></tbody>
        </table>
      </section>
    </main>

    <script>
      const statusEl = document.getElementById('status');
      const summaryEl = document.getElementById('summary');
      const rowsEl = document.getElementById('rows');
      const bulkCourtSelect = document.getElementById('bulkCourtSelect');
      const applyBulkButton = document.getElementById('applyBulkButton');
      const saveAllButton = document.getElementById('saveAllButton');
      let schedules = [];

      function escapeHtml(value) {
        return String(value || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
      }
      function setStatus(message, type = '') {
        statusEl.textContent = message;
        statusEl.className = `status ${type}`.trim();
      }
      function courtLabel(court) {
        return court ? `Sân ${court}` : 'Chưa gán';
      }
      function renderSummary() {
        const assigned = schedules.filter((item) => item.assignedCourt).length;
        summaryEl.textContent = `Đã gán ${assigned}/${schedules.length} trận • Chưa gán ${schedules.length - assigned}`;
      }
      function changedAssignments() {
        return Array.from(rowsEl.querySelectorAll('select[data-court-select]'))
          .map((select) => ({
            scheduleId: select.dataset.courtSelect,
            currentCourt: String(select.dataset.currentCourt || ''),
            nextCourt: String(select.value || ''),
            select,
          }))
          .filter((item) => item.scheduleId && item.currentCourt !== item.nextCourt);
      }
      function updateDirtyState() {
        const changed = changedAssignments();
        saveAllButton.disabled = changed.length === 0;
        saveAllButton.textContent = changed.length ? `Lưu tất cả (${changed.length})` : 'Lưu tất cả';
      }
      function setScheduleAssignment(scheduleId, court) {
        const nextCourt = String(court || '');
        const item = schedules.find((schedule) => schedule.scheduleId === scheduleId);
        if (item) item.assignedCourt = nextCourt;
        const row = rowsEl.querySelector(`tr[data-schedule-id="${CSS.escape(scheduleId)}"]`);
        if (!row) return;
        row.classList.toggle('assigned', Boolean(nextCourt));
        const badge = row.querySelector('.badge');
        if (badge) {
          badge.textContent = courtLabel(nextCourt);
          badge.className = `badge ${nextCourt ? 'assigned' : ''}`;
        }
        const select = row.querySelector('select[data-court-select]');
        if (select) {
          select.value = nextCourt;
          select.dataset.currentCourt = nextCourt;
        }
      }
      function courtSelect(item) {
        const current = String(item.assignedCourt || '');
        return `<select data-court-select="${escapeHtml(item.scheduleId)}" data-current-court="${escapeHtml(current)}">
          <option value="" ${!current ? 'selected' : ''}>Chưa gán</option>
          ${['1', '2', '3', '4', '5', '6'].map((court) => `<option value="${court}" ${court === current ? 'selected' : ''}>Sân ${court}</option>`).join('')}
        </select>`;
      }
      function renderRows() {
        renderSummary();
        if (!schedules.length) {
          rowsEl.innerHTML = '<tr><td colspan="7">Chưa có trận đối kháng. Hãy import file trước.</td></tr>';
          updateDirtyState();
          return;
        }
        rowsEl.innerHTML = schedules.map((item, index) => `
          <tr class="${item.assignedCourt ? 'assigned' : ''}" data-schedule-id="${escapeHtml(item.scheduleId)}">
            <td>${index + 1}</td>
            <td>${escapeHtml(item.roundType || '--')} ${item.groupName ? `<div class="muted">Nhóm ${escapeHtml(item.groupName)}</div>` : ''}</td>
            <td>${escapeHtml(item.weightClass || '--')}</td>
            <td><div class="fighter-name">${escapeHtml(item.redName)}</div><div class="muted">${escapeHtml(item.redResolved === false ? 'Đang chờ kết quả' : item.redUnit)}</div></td>
            <td><div class="fighter-name">${escapeHtml(item.blueName)}</div><div class="muted">${escapeHtml(item.blueResolved === false ? 'Đang chờ kết quả' : item.blueUnit)}</div></td>
            <td><span class="badge ${item.assignedCourt ? 'assigned' : ''}">${escapeHtml(courtLabel(item.assignedCourt))}</span></td>
            <td><div class="assignment-cell">${courtSelect(item)}<button class="success" type="button" data-save="${escapeHtml(item.scheduleId)}">Lưu</button></div></td>
          </tr>
        `).join('');
        rowsEl.querySelectorAll('select[data-court-select]').forEach((select) => select.addEventListener('change', updateDirtyState));
        rowsEl.querySelectorAll('button[data-save]').forEach((button) => button.addEventListener('click', () => saveOne(button.dataset.save)));
        updateDirtyState();
      }
      async function loadData() {
        const response = await fetch('/api/combat/dispatch');
        const data = await response.json();
        schedules = data.schedules || [];
        renderRows();
        setStatus(schedules.length ? 'Sẵn sàng chia sân đối kháng.' : 'Chưa có dữ liệu đối kháng.', schedules.length ? 'ok' : 'error');
      }
      async function saveOne(scheduleId) {
        const select = rowsEl.querySelector(`select[data-court-select="${CSS.escape(scheduleId)}"]`);
        if (!select) return;
        const currentCourt = String(select.dataset.currentCourt || '');
        const nextCourt = String(select.value || '');
        if (currentCourt === nextCourt) return;
        try {
          if (currentCourt) {
            await fetch(`/api/combat/courts/${encodeURIComponent(currentCourt)}/remove-schedule`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ scheduleId }),
            });
          }
          if (nextCourt) {
            const response = await fetch(`/api/combat/courts/${encodeURIComponent(nextCourt)}/assign-schedule`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ scheduleIds: [scheduleId] }),
            });
            const data = await response.json();
            if (!response.ok) throw new Error(data.error || 'Không lưu được phân sân.');
          }
          setScheduleAssignment(scheduleId, nextCourt);
          renderSummary();
          updateDirtyState();
          setStatus(nextCourt ? `Đã gán trận vào sân ${nextCourt}.` : 'Đã bỏ gán trận.', 'ok');
        } catch (error) {
          setStatus(error.message, 'error');
          select.value = currentCourt;
          updateDirtyState();
        }
      }
      async function saveAll() {
        const changes = changedAssignments();
        if (!changes.length) return;
        saveAllButton.disabled = true;
        try {
          setStatus(`Đang lưu ${changes.length} thay đổi...`);
          for (const change of changes) {
            if (change.currentCourt) {
              await fetch(`/api/combat/courts/${encodeURIComponent(change.currentCourt)}/remove-schedule`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ scheduleId: change.scheduleId }),
              });
            }
          }
          const byCourt = new Map();
          changes.filter((change) => change.nextCourt).forEach((change) => {
            if (!byCourt.has(change.nextCourt)) byCourt.set(change.nextCourt, []);
            byCourt.get(change.nextCourt).push(change.scheduleId);
          });
          for (const [court, scheduleIds] of byCourt.entries()) {
            const response = await fetch(`/api/combat/courts/${encodeURIComponent(court)}/assign-schedule`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ scheduleIds }),
            });
            const data = await response.json();
            if (!response.ok) throw new Error(data.error || `Không gán được sân ${court}.`);
          }
          changes.forEach((change) => setScheduleAssignment(change.scheduleId, change.nextCourt));
          renderSummary();
          updateDirtyState();
          setStatus(`Đã lưu ${changes.length} thay đổi phân sân.`, 'ok');
        } catch (error) {
          setStatus(error.message, 'error');
          changes.forEach((change) => { change.select.value = change.currentCourt; });
          updateDirtyState();
        }
      }
      applyBulkButton.addEventListener('click', () => {
        const value = String(bulkCourtSelect.value || '');
        if (!value) {
          setStatus('Chọn sân cần gán trước.', 'error');
          return;
        }
        const nextCourt = value === 'clear' ? '' : value;
        rowsEl.querySelectorAll('select[data-court-select]').forEach((select) => { select.value = nextCourt; });
        updateDirtyState();
        setStatus(nextCourt ? `Đã chọn tất cả vào sân ${nextCourt}. Bấm Lưu tất cả để lưu.` : 'Đã chọn bỏ gán tất cả. Bấm Lưu tất cả để lưu.', 'ok');
      });
      saveAllButton.addEventListener('click', saveAll);
      loadData().catch((error) => setStatus(error.message, 'error'));
    </script>
  </body>
</html>
