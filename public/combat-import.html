<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Import đối kháng</title>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; font-family: Arial, sans-serif; background: #101114; color: #f7f7f2; }
      header { display: flex; justify-content: space-between; gap: 14px; padding: 18px 22px; background: #181a20; border-bottom: 1px solid #333741; }
      h1, p { margin: 0; }
      h1 { font-size: 30px; }
      main { display: grid; gap: 14px; padding: 16px; }
      .muted { color: #a8adb7; line-height: 1.35; }
      .panel { display: grid; gap: 14px; padding: 16px; border: 1px solid #333741; border-radius: 8px; background: #181a20; }
      .actions { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
      a, button { display: inline-grid; place-items: center; min-height: 42px; padding: 0 14px; border: 0; border-radius: 8px; background: #237083; color: #fff; font-weight: 900; text-decoration: none; cursor: pointer; }
      .secondary { background: #3a404c; }
      .success { background: #2f7d4e; }
      input { min-height: 42px; padding: 10px; border: 1px solid #3a404c; border-radius: 8px; background: #101114; color: #f7f7f2; }
      .status { padding: 12px 14px; border: 1px solid #333741; border-radius: 8px; background: #181a20; }
      .status.ok { border-color: #2f7d4e; background: #132719; color: #dff6e6; }
      .status.error { border-color: #a83232; background: #311616; color: #ffe1e1; }
      .table-wrap { overflow: auto; border: 1px solid #333741; border-radius: 8px; }
      table { width: 100%; min-width: 900px; border-collapse: collapse; }
      th, td { padding: 10px; border-bottom: 1px solid #2a2f39; text-align: left; }
      th { background: #22252d; }
    </style>
  </head>
  <body>
    <header>
      <div>
        <h1>Import đối kháng</h1>
        <p class="muted">Nhập file Excel danh sách cặp đấu đỏ/xanh và lưu thành lịch đối kháng.</p>
      </div>
      <div class="actions">
        <a class="secondary" href="/combat-dispatch.html">Chia sân đối kháng</a>
        <a class="secondary" href="/">Dashboard</a>
      </div>
    </header>

    <main>
      <section class="panel">
        <form class="actions" id="importForm">
          <input id="combatFile" type="file" accept=".xlsx,.csv,.tsv" />
          <button class="success" type="submit">Import</button>
        </form>
        <div class="status" id="status">Chọn file có cột VĐV đỏ, VĐV xanh, hạng cân.</div>
      </section>

      <section class="panel">
        <h2>Danh sách đã import</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>STT</th>
                <th>Loại trận</th>
                <th>Hạng cân</th>
                <th>Đỏ</th>
                <th>Xanh</th>
                <th>Sân</th>
              </tr>
            </thead>
            <tbody id="rows"><tr><td colspan="6">Đang tải...</td></tr></tbody>
          </table>
        </div>
      </section>
    </main>

    <script>
      const form = document.getElementById('importForm');
      const combatFile = document.getElementById('combatFile');
      const statusEl = document.getElementById('status');
      const rowsEl = document.getElementById('rows');

      function escapeHtml(value) {
        return String(value || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
      }

      function setStatus(message, type = '') {
        statusEl.textContent = message;
        statusEl.className = `status ${type}`.trim();
      }

      function renderRows(schedules) {
        if (!schedules.length) {
          rowsEl.innerHTML = '<tr><td colspan="6">Chưa có trận đối kháng nào.</td></tr>';
          return;
        }
        rowsEl.innerHTML = schedules.map((item, index) => `
          <tr>
            <td>${index + 1}</td>
            <td>${escapeHtml(item.roundType || '--')}</td>
            <td>${escapeHtml(item.weightClass || '--')}</td>
            <td><strong>${escapeHtml(item.redName)}</strong><div class="muted">${escapeHtml(item.redResolved === false ? 'Đang chờ kết quả' : item.redUnit)}</div></td>
            <td><strong>${escapeHtml(item.blueName)}</strong><div class="muted">${escapeHtml(item.blueResolved === false ? 'Đang chờ kết quả' : item.blueUnit)}</div></td>
            <td>${item.assignedCourt ? `Sân ${escapeHtml(item.assignedCourt)}` : 'Chưa gán'}</td>
          </tr>
        `).join('');
      }

      async function loadSchedules() {
        const response = await fetch('/api/combat/schedules');
        const data = await response.json();
        renderRows(data.schedules || []);
      }

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        const file = combatFile.files[0];
        if (!file) {
          setStatus('Chọn file Excel trước.', 'error');
          return;
        }

        const formData = new FormData();
        formData.append('file', file);
        setStatus('Đang import đối kháng...');
        const response = await fetch('/api/combat/import', { method: 'POST', body: formData });
        const data = await response.json();
        if (!response.ok) {
          setStatus(data.error || 'Không import được file.', 'error');
          return;
        }
        setStatus(`Đã import ${data.totalMatches} trận từ ${data.fileName}.`, 'ok');
        renderRows(data.schedules || []);
      });

      loadSchedules().catch((error) => setStatus(error.message, 'error'));
    </script>
  </body>
</html>
