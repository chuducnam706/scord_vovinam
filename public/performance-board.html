<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bảng điểm hội diễn</title>
    <style>
      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Arial, Helvetica, sans-serif;
        background: #ffffff;
        color: #050505;
      }

      main {
        width: min(1280px, 96vw);
        margin: 0 auto;
        padding: 34px 20px 28px;
      }

      .tournament-header {
        display: grid;
        grid-template-columns: 1fr;
        align-items: center;
        justify-content: center;
        gap: 10px;
        width: 100%;
        margin: 0 auto 16px;
        text-align: center;
      }

      .logo {
        width: 64px;
        height: 64px;
        object-fit: contain;
        justify-self: center;
      }

      .logo.placeholder {
        display: none;
      }

      .tournament-name {
        min-width: 0;
        color: #001fb8;
        font-size: clamp(28px, 3.8vw, 52px);
        font-weight: 1000;
        line-height: 1.05;
        text-transform: uppercase;
        white-space: nowrap;
        overflow: visible;
        text-overflow: clip;
      }

      .routine-title {
        margin: 16px 0 28px;
        color: #d92b2b;
        font-size: clamp(24px, 2.6vw, 34px);
        font-weight: 1000;
        text-align: center;
        text-transform: uppercase;
      }

      .athlete-info {
        display: grid;
        gap: 14px;
        margin: 0 0 28px 34px;
        font-size: clamp(22px, 2.2vw, 32px);
      }

      .athlete-name {
        display: flex;
        align-items: center;
        gap: 14px;
        font-size: clamp(28px, 3vw, 38px);
        font-weight: 1000;
      }

      .meta-line {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 500;
      }

      .meta-icon {
        width: 28px;
        text-align: center;
      }

      .judge-grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 20px;
        margin-top: 22px;
      }

      .judge-card {
        display: grid;
        gap: 10px;
        text-align: center;
      }

      .judge-title {
        font-size: clamp(20px, 2.2vw, 30px);
        font-weight: 1000;
      }

      .score-box {
        display: grid;
        place-items: center;
        min-height: 132px;
        border: 2px solid #050505;
        background: #ffffff;
        font-size: clamp(44px, 5.6vw, 76px);
        font-weight: 1000;
        line-height: 1;
      }

      .judge-card.counted .score-box {
        background: #ecfdf5;
        border-color: #16a34a;
      }

      .judge-card.excluded .score-box {
        background: #fff7ed;
        border-color: #f97316;
        color: #9a3412;
      }

      .total-area {
        display: grid;
        justify-content: center;
        gap: 8px;
        margin-top: 30px;
        text-align: center;
      }

      .total-label {
        font-size: clamp(24px, 2.6vw, 36px);
        font-weight: 1000;
      }

      .total-box {
        display: grid;
        place-items: center;
        width: min(420px, 84vw);
        min-height: 124px;
        border: 3px solid #050505;
        background: #b9deeb;
        font-size: clamp(56px, 7vw, 92px);
        font-weight: 1000;
        line-height: 1;
      }

      .result-note {
        display: none;
      }

      @media (max-width: 900px) {
        main { padding-top: 54px; }
        .judge-grid {
          grid-template-columns: repeat(2, 1fr);
        }
        .athlete-info {
          margin-left: 0;
        }
      }

      @media (max-width: 560px) {
        .tournament-header {
          grid-template-columns: 1fr;
          gap: 8px;
        }
        .logo {
          width: 42px;
          height: 42px;
        }
        .judge-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="tournament-header">
        <img class="logo" id="leftLogo" alt="Logo giải" hidden />
        <div class="tournament-name" id="tournamentName">TÊN GIẢI ĐẤU</div>
      </section>

      <section class="routine-title" id="routineTitle">🏆 BÀI THI</section>

      <section class="athlete-info">
        <div class="athlete-name">
          <span class="meta-icon">👥</span>
          <span id="athleteName">Chưa có VĐV/đội</span>
        </div>
        <div class="meta-line">
          <span class="meta-icon">🏫</span>
          <span>Đơn vị: <span id="athleteUnit">--</span></span>
        </div>
        <div class="meta-line">
          <span class="meta-icon">🌐</span>
          <span>Nhóm tuổi: <span id="ageGroup">--</span></span>
        </div>
      </section>

      <section class="judge-grid" id="judgeGrid"></section>

      <section class="total-area">
        <div class="total-label">TỔNG ĐIỂM</div>
        <div class="total-box" id="resultValue">--</div>
        <div class="result-note" id="resultDetail"></div>
      </section>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const court = params.get('court') || '1';
      const matchId = params.get('matchId') || `PERFORMANCE_COURT_${court}`;

      const judgeGrid = document.getElementById('judgeGrid');
      const resultValue = document.getElementById('resultValue');
      const resultDetail = document.getElementById('resultDetail');
      const tournamentName = document.getElementById('tournamentName');
      const leftLogo = document.getElementById('leftLogo');
      const routineTitle = document.getElementById('routineTitle');
      const athleteName = document.getElementById('athleteName');
      const athleteUnit = document.getElementById('athleteUnit');
      const ageGroup = document.getElementById('ageGroup');

      let scoreDecimals = 0;
      let currentDisplay = null;

      function escapeText(value) {
        return String(value || '').trim();
      }

      function formatScore(value) {
        return Number.isFinite(Number(value)) ? Number(value).toFixed(scoreDecimals) : '';
      }

      function formatTotal(value) {
        return Number.isFinite(Number(value)) ? Number(value).toFixed(scoreDecimals) : '--';
      }

      function formatRoutineTitle(entry, schedule) {
        const routine = escapeText(entry?.routineName || schedule?.routineName || 'Bài thi');
        const gender = escapeText(entry?.genderGroup || schedule?.genderGroup || '');
        const age = escapeText(entry?.ageGroup || schedule?.ageGroup || '');
        return `🏆 ${routine}${gender ? ` ${gender}` : ''}${age ? ` LT${age}` : ''}`;
      }

      function updateTournamentInfo(info = {}) {
        tournamentName.textContent = escapeText(info.name) || 'TÊN GIẢI ĐẤU';
        const logo = escapeText(info.logoDataUrl);
        leftLogo.hidden = !logo;
        if (logo) leftLogo.src = logo;
      }

      function updateEntryInfo(display) {
        currentDisplay = display;

        if (!display || !display.hasSchedule || !display.currentEntry) {
          routineTitle.textContent = '🏆 BÀI THI';
          athleteName.textContent = 'Sân này chưa được phân nội dung';
          athleteUnit.textContent = '--';
          ageGroup.textContent = '--';
          return;
        }

        const entry = display.currentEntry;
        const memberSummary = Number(entry.participantCount || 1) > 1
          ? (entry.memberSummary || (entry.memberNames || []).join(', '))
          : '';

        routineTitle.textContent = formatRoutineTitle(entry, display.schedule);
        athleteName.textContent = memberSummary || entry.displayName || 'Chưa có tên';
        athleteUnit.textContent = entry.unit || '--';
        ageGroup.textContent = entry.ageGroup || display.schedule?.ageGroup || '--';
      }

      function judgeResultType(result, judgeId) {
        if (!result?.ready) return { className: '' };

        const excluded = result.excludedScores.find((item) => Number(item.judgeId) === Number(judgeId));
        if (excluded) return { className: 'excluded' };

        const counted = result.countedScores.find((item) => Number(item.judgeId) === Number(judgeId));
        if (counted) return { className: 'counted' };
        return { className: '' };
      }

      function render(match) {
        const result = match.result;
        scoreDecimals = Number(match.config?.scoreDecimals ?? 0);
        judgeGrid.innerHTML = '';

        for (let i = 1; i <= match.config.judgeCount; i += 1) {
          const score = match.judgeScores?.[i] ?? match.judgeScores?.[String(i)];
          const type = judgeResultType(result, i);
          const card = document.createElement('div');
          card.className = `judge-card ${type.className}`.trim();
          card.innerHTML = `
            <div class="judge-title">Giám định ${i}</div>
            <div class="score-box">${formatScore(score)}</div>
          `;
          judgeGrid.appendChild(card);
        }

        if (result.ready) {
          resultValue.textContent = formatTotal(result.total);
          resultDetail.textContent = '';
        } else {
          resultValue.textContent = '--';
          resultDetail.textContent = '';
        }
      }

      async function loadTournamentInfo() {
        const response = await fetch('/api/tournament-info');
        const data = await response.json();
        updateTournamentInfo(data);
      }

      async function loadSnapshot() {
        const response = await fetch(`/api/performance/matches/${encodeURIComponent(matchId)}?court=${encodeURIComponent(court)}`);
        const data = await response.json();
        render(data);
      }

      const events = new EventSource(`/api/events?type=performance&court=${encodeURIComponent(court)}&matchId=${encodeURIComponent(matchId)}`);
      const displayEvents = new EventSource(`/api/events?type=performance-court-display&court=${encodeURIComponent(court)}`);

      events.addEventListener('open', () => {
      });

      events.addEventListener('error', () => {
      });

      events.addEventListener('performanceSnapshot', (event) => {
        render(JSON.parse(event.data));
      });

      displayEvents.addEventListener('performanceCourtDisplaySnapshot', (event) => {
        updateEntryInfo(JSON.parse(event.data));
      });

      Promise.all([
        loadTournamentInfo(),
        loadSnapshot(),
        fetch(`/api/performance/courts/${encodeURIComponent(court)}/display`)
          .then((response) => response.json())
          .then(updateEntryInfo),
      ]).catch(() => {
      });
    </script>
  </body>
</html>
