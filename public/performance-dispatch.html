<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chia sân hội diễn</title>
    <style>
      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Arial, sans-serif;
        background: #101114;
        color: #f7f7f2;
      }

      header {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        padding: 18px 22px;
        background: #181a20;
        border-bottom: 1px solid #333741;
      }

      h1,
      p {
        margin: 0;
      }

      h1 { font-size: 30px; }

      main {
        display: grid;
        gap: 14px;
        padding: 16px;
      }

      a,
      button {
        display: inline-grid;
        place-items: center;
        min-height: 40px;
        padding: 0 12px;
        border: 0;
        border-radius: 7px;
        background: #315f8f;
        color: #ffffff;
        font-size: 14px;
        font-weight: 800;
        text-decoration: none;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      select {
        min-height: 40px;
        min-width: 120px;
        padding: 0 10px;
        border: 1px solid #3a404c;
        border-radius: 7px;
        background: #101114;
        color: #f7f7f2;
        font-size: 14px;
      }

      .muted {
        color: #a8adb7;
        line-height: 1.35;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .secondary { background: #3a404c; }
      .success { background: #2f7d4e; }
      .danger { background: #a83232; }
      .performance-action { background: #7155a6; }

      .status {
        padding: 12px 14px;
        border: 1px solid #333741;
        border-radius: 8px;
        background: #181a20;
        color: #d8dbe2;
      }

      .status.ok {
        border-color: #2f7d4e;
        background: #132719;
        color: #dff6e6;
      }

      .status.error {
        border-color: #a83232;
        background: #311616;
        color: #ffe1e1;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: end;
        gap: 10px;
        padding: 12px;
        border: 1px solid #333741;
        border-radius: 8px;
        background: #181a20;
      }

      .field {
        display: grid;
        gap: 6px;
      }

      .field label {
        color: #c9ccd3;
        font-size: 13px;
        font-weight: 800;
      }

      .summary {
        margin-left: auto;
        color: #a8adb7;
        font-weight: 800;
      }

      .table-wrap {
        overflow: auto;
        border: 1px solid #333741;
        border-radius: 8px;
        background: #181a20;
      }

      table {
        width: 100%;
        min-width: 760px;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 12px;
        border-bottom: 1px solid #2a2f39;
        text-align: left;
        vertical-align: middle;
      }

      th {
        position: sticky;
        top: 0;
        background: #22252d;
        color: #f0f2f6;
        font-size: 14px;
      }

      tr.assigned {
        background: #171324;
      }

      tr:last-child td {
        border-bottom: 0;
      }

      .badge {
        display: inline-grid;
        place-items: center;
        min-width: 76px;
        min-height: 30px;
        padding: 0 10px;
        border-radius: 999px;
        background: #8a6a1f;
        color: #ffffff;
        font-size: 13px;
        font-weight: 900;
      }

      .badge.assigned { background: #7155a6; }
      .badge.empty { background: #8a6a1f; }

      .assignment-cell {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
      }

      .name {
        font-weight: 900;
      }

      @media (max-width: 760px) {
        header,
        .toolbar {
          display: grid;
        }

        .summary {
          margin-left: 0;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div>
        <h1>Chia sân hội diễn</h1>
        <p class="muted">Màn này chỉ dùng để gán nội dung vào 6 sân. Không hiển thị số lượt/tiến độ.</p>
      </div>
      <div class="actions">
        <a class="performance-action" href="/arena.html">Điều phối sân</a>
        <a class="secondary" href="/">Dashboard</a>
        <button class="secondary" id="refreshButton" type="button">Tải lại</button>
      </div>
    </header>

    <main>
      <div class="status" id="status">Đang tải danh sách hội diễn...</div>

      <section class="toolbar">
        <div class="field">
          <label for="courtFilter">Lọc sân</label>
          <select id="courtFilter">
            <option value="all">Tất cả</option>
            <option value="unassigned">Chưa gán</option>
            <option value="1">Sân 1</option>
            <option value="2">Sân 2</option>
            <option value="3">Sân 3</option>
            <option value="4">Sân 4</option>
            <option value="5">Sân 5</option>
            <option value="6">Sân 6</option>
          </select>
        </div>
        <div class="summary" id="summary">—</div>
      </section>

      <section class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>STT</th>
              <th>Nội dung / Bài quyền</th>
              <th>Lứa tuổi</th>
              <th>Sân</th>
              <th>Hành động</th>
            </tr>
          </thead>
          <tbody id="scheduleRows">
            <tr>
              <td colspan="5">Đang tải...</td>
            </tr>
          </tbody>
        </table>
      </section>
    </main>

    <script>
      const statusEl = document.getElementById('status');
      const summaryEl = document.getElementById('summary');
      const scheduleRows = document.getElementById('scheduleRows');
      const courtFilter = document.getElementById('courtFilter');
      const refreshButton = document.getElementById('refreshButton');

      let dispatchData = { courts: [], schedules: [] };

      function escapeHtml(value) {
        return String(value || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }

      function setStatus(message, type = '') {
        statusEl.textContent = message;
        statusEl.className = `status ${type}`.trim();
      }

      function courtLabel(court) {
        return court ? `Sân ${court}` : 'Chưa gán';
      }

      function courtCanReceivePerformance(court) {
        const item = (dispatchData.courts || []).find((courtItem) => String(courtItem.court) === String(court));
        return Boolean(item && (!item.assigned || item.mode === 'performance'));
      }

      function renderSummary() {
        const schedules = dispatchData.schedules || [];
        const assigned = schedules.filter((schedule) => schedule.assignedCourt).length;
        summaryEl.textContent = `Tổng ${schedules.length} nội dung • Đã gán ${assigned} • Chưa gán ${schedules.length - assigned}`;
      }

      function filteredSchedules() {
        const filter = courtFilter.value;
        const schedules = dispatchData.schedules || [];

        if (filter === 'unassigned') {
          return schedules.filter((schedule) => !schedule.assignedCourt);
        }
        if (filter !== 'all') {
          return schedules.filter((schedule) => String(schedule.assignedCourt || '') === filter);
        }
        return schedules;
      }

      function courtSelect(schedule) {
        const current = String(schedule.assignedCourt || '');
        const options = [''].concat(['1', '2', '3', '4', '5', '6']).map((court) => {
          const selected = court === current ? 'selected' : '';
          const label = court ? `Sân ${court}` : 'Chưa gán';
          return `<option value="${court}" ${selected}>${label}</option>`;
        }).join('');

        return `<select data-court-select="${escapeHtml(schedule.groupId)}" data-current-court="${escapeHtml(current)}">${options}</select>`;
      }

      function renderRows() {
        const schedules = filteredSchedules();
        renderSummary();

        if (!schedules.length) {
          scheduleRows.innerHTML = '<tr><td colspan="5">Không có nội dung phù hợp.</td></tr>';
          return;
        }

        scheduleRows.innerHTML = schedules.map((schedule, index) => {
          const assignedCourt = String(schedule.assignedCourt || '');
          const badgeClass = assignedCourt ? 'assigned' : 'empty';

          return `
            <tr class="${assignedCourt ? 'assigned' : ''}">
              <td>${index + 1}</td>
              <td>
                <div class="name">${escapeHtml(schedule.routineName || '')}</div>
              </td>
              <td>${escapeHtml(schedule.ageGroup || '')}</td>
              <td><span class="badge ${badgeClass}">${escapeHtml(courtLabel(assignedCourt))}</span></td>
              <td>
                <div class="assignment-cell">
                  ${courtSelect(schedule)}
                  <button class="success" type="button" data-save-assignment="${escapeHtml(schedule.groupId)}">Lưu</button>
                </div>
              </td>
            </tr>
          `;
        }).join('');

        scheduleRows.querySelectorAll('button[data-save-assignment]').forEach((button) => {
          button.addEventListener('click', () => saveAssignment(button.dataset.saveAssignment));
        });
      }

      async function loadDispatch(showOk = true) {
        const response = await fetch('/api/performance/dispatch');
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error || 'Không tải được dữ liệu chia sân.');
        }

        dispatchData = data || { courts: [], schedules: [] };
        renderRows();
        if (showOk) setStatus('Sẵn sàng chia sân hội diễn.', 'ok');
      }

      async function removeSchedule(court, groupId) {
        const response = await fetch(`/api/performance/courts/${encodeURIComponent(court)}/remove-schedule`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ groupId }),
        });
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error || 'Không bỏ gán được nội dung.');
        }
      }

      async function assignSchedule(court, groupId) {
        const response = await fetch(`/api/performance/courts/${encodeURIComponent(court)}/assign-schedule`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ groupIds: [groupId] }),
        });
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error || 'Không gán được nội dung.');
        }
      }

      async function saveAssignment(groupId) {
        const select = Array.from(scheduleRows.querySelectorAll('select[data-court-select]'))
          .find((item) => item.dataset.courtSelect === groupId);
        if (!select) return;

        const currentCourt = String(select.dataset.currentCourt || '');
        const nextCourt = String(select.value || '');

        if (currentCourt === nextCourt) {
          setStatus('Không có thay đổi để lưu.', 'ok');
          return;
        }

        if (nextCourt && !courtCanReceivePerformance(nextCourt)) {
          setStatus(`Sân ${nextCourt} đang là đối kháng, không gán hội diễn vào được.`, 'error');
          select.value = currentCourt;
          return;
        }

        try {
          setStatus('Đang lưu phân sân...');
          if (currentCourt) {
            await removeSchedule(currentCourt, groupId);
          }
          if (nextCourt) {
            await assignSchedule(nextCourt, groupId);
          }
          await loadDispatch(false);
          setStatus(nextCourt ? `Đã gán nội dung vào sân ${nextCourt}.` : 'Đã bỏ gán nội dung.', 'ok');
        } catch (error) {
          setStatus(error.message, 'error');
          await loadDispatch(false).catch(() => {});
        }
      }

      courtFilter.addEventListener('change', renderRows);
      refreshButton.addEventListener('click', () => {
        setStatus('Đang tải lại...');
        loadDispatch().catch((error) => setStatus(error.message, 'error'));
      });

      loadDispatch().catch((error) => setStatus(error.message, 'error'));
    </script>
  </body>
</html>
