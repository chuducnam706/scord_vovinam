<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chia sân hội diễn</title>
    <style>
      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Arial, sans-serif;
        background: #101114;
        color: #f7f7f2;
      }

      header {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        padding: 18px 22px;
        background: #181a20;
        border-bottom: 1px solid #333741;
      }

      h1,
      p {
        margin: 0;
      }

      h1 { font-size: 30px; }

      main {
        display: grid;
        gap: 14px;
        padding: 16px;
      }

      a,
      button {
        display: inline-grid;
        place-items: center;
        min-height: 40px;
        padding: 0 12px;
        border: 0;
        border-radius: 7px;
        background: #315f8f;
        color: #ffffff;
        font-size: 14px;
        font-weight: 800;
        text-decoration: none;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      select {
        min-height: 40px;
        min-width: 120px;
        padding: 0 10px;
        border: 1px solid #3a404c;
        border-radius: 7px;
        background: #101114;
        color: #f7f7f2;
        font-size: 14px;
      }

      .muted {
        color: #a8adb7;
        line-height: 1.35;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .secondary { background: #3a404c; }
      .success { background: #2f7d4e; }
      .danger { background: #a83232; }
      .performance-action { background: #7155a6; }

      .status {
        padding: 12px 14px;
        border: 1px solid #333741;
        border-radius: 8px;
        background: #181a20;
        color: #d8dbe2;
      }

      .status.ok {
        border-color: #2f7d4e;
        background: #132719;
        color: #dff6e6;
      }

      .status.error {
        border-color: #a83232;
        background: #311616;
        color: #ffe1e1;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: end;
        gap: 10px;
        padding: 12px;
        border: 1px solid #333741;
        border-radius: 8px;
        background: #181a20;
      }

      .field {
        display: grid;
        gap: 6px;
      }

      .field label {
        color: #c9ccd3;
        font-size: 13px;
        font-weight: 800;
      }

      .summary {
        margin-left: auto;
        color: #a8adb7;
        font-weight: 800;
      }

      .bulk-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
      }

      .bulk-actions select {
        min-width: 150px;
      }

      .table-wrap {
        overflow: auto;
        border: 1px solid #333741;
        border-radius: 8px;
        background: #181a20;
      }

      table {
        width: 100%;
        min-width: 760px;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 12px;
        border-bottom: 1px solid #2a2f39;
        text-align: left;
        vertical-align: middle;
      }

      th {
        position: sticky;
        top: 0;
        background: #22252d;
        color: #f0f2f6;
        font-size: 14px;
      }

      tr.assigned {
        background: #171324;
      }

      tr:last-child td {
        border-bottom: 0;
      }

      .badge {
        display: inline-grid;
        place-items: center;
        min-width: 76px;
        min-height: 30px;
        padding: 0 10px;
        border-radius: 999px;
        background: #8a6a1f;
        color: #ffffff;
        font-size: 13px;
        font-weight: 900;
      }

      .badge.assigned { background: #7155a6; }
      .badge.empty { background: #8a6a1f; }

      .assignment-cell {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
      }

      .name {
        font-weight: 900;
      }

      @media (max-width: 760px) {
        header,
        .toolbar {
          display: grid;
        }

        .summary {
          margin-left: 0;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div>
        <h1>Chia sân hội diễn</h1>
        <p class="muted">Import danh sách xong, vào đây gán từng bài quyền/nội dung vào 6 sân.</p>
      </div>
      <div class="actions">
        <a class="performance-action" href="/arena.html">Điều phối sân</a>
        <a class="secondary" href="/">Dashboard</a>
        <button class="secondary" id="refreshButton" type="button">Tải lại</button>
      </div>
    </header>

    <main>
      <div class="status" id="status">Đang tải danh sách hội diễn...</div>

      <section class="toolbar">
        <div class="bulk-actions">
          <select id="bulkCourtSelect">
            <option value="">Gán tất cả</option>
            <option value="1">Vào sân 1</option>
            <option value="2">Vào sân 2</option>
            <option value="3">Vào sân 3</option>
            <option value="4">Vào sân 4</option>
            <option value="5">Vào sân 5</option>
            <option value="6">Vào sân 6</option>
            <option value="clear">Bỏ gán tất cả</option>
          </select>
          <button class="secondary" id="applyBulkCourtButton" type="button">Áp dụng</button>
          <button class="success" id="saveAllButton" type="button" disabled>Lưu tất cả</button>
        </div>
        <div class="summary" id="summary">—</div>
      </section>

      <section class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>STT</th>
              <th>Nội dung / Bài quyền</th>
              <th>Sân</th>
              <th>Hành động</th>
            </tr>
          </thead>
          <tbody id="scheduleRows">
            <tr>
              <td colspan="4">Đang tải...</td>
            </tr>
          </tbody>
        </table>
      </section>
    </main>

    <script>
      const statusEl = document.getElementById('status');
      const summaryEl = document.getElementById('summary');
      const scheduleRows = document.getElementById('scheduleRows');
      const refreshButton = document.getElementById('refreshButton');
      const bulkCourtSelect = document.getElementById('bulkCourtSelect');
      const applyBulkCourtButton = document.getElementById('applyBulkCourtButton');
      const saveAllButton = document.getElementById('saveAllButton');

      let dispatchData = { courts: [], schedules: [] };

      function escapeHtml(value) {
        return String(value || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }

      function setStatus(message, type = '') {
        statusEl.textContent = message;
        statusEl.className = `status ${type}`.trim();
      }

      function courtLabel(court) {
        return court ? `Sân ${court}` : 'Chưa gán';
      }

      function courtCanReceivePerformance(court) {
        const item = (dispatchData.courts || []).find((courtItem) => String(courtItem.court) === String(court));
        return Boolean(item && (!item.assigned || item.mode === 'performance'));
      }

      function renderSummary() {
        const schedules = dispatchData.schedules || [];
        const assigned = schedules.filter((schedule) => schedule.assignedCourt).length;
        summaryEl.textContent = `Đã gán ${assigned}/${schedules.length} nội dung • Chưa gán ${schedules.length - assigned}`;
      }

      function changedAssignments() {
        return Array.from(scheduleRows.querySelectorAll('select[data-court-select]'))
          .map((select) => ({
            groupId: select.dataset.courtSelect,
            currentCourt: String(select.dataset.currentCourt || ''),
            nextCourt: String(select.value || ''),
            select,
          }))
          .filter((item) => item.groupId && item.currentCourt !== item.nextCourt);
      }

      function updateDirtyState() {
        const changed = changedAssignments();
        saveAllButton.disabled = changed.length === 0;
        saveAllButton.textContent = changed.length ? `Lưu tất cả (${changed.length})` : 'Lưu tất cả';
      }

      function setScheduleAssignment(groupId, court) {
        const nextCourt = String(court || '');
        const schedule = (dispatchData.schedules || []).find((item) => item.groupId === groupId);
        if (schedule) schedule.assignedCourt = nextCourt || null;

        const row = Array.from(scheduleRows.querySelectorAll('tr[data-group-id]'))
          .find((item) => item.dataset.groupId === groupId);
        if (!row) return;

        row.classList.toggle('assigned', Boolean(nextCourt));

        const badge = row.querySelector('.badge');
        if (badge) {
          badge.textContent = courtLabel(nextCourt);
          badge.className = `badge ${nextCourt ? 'assigned' : 'empty'}`;
        }

        const select = row.querySelector('select[data-court-select]');
        if (select) {
          select.value = nextCourt;
          select.dataset.currentCourt = nextCourt;
        }
      }

      function setControlsDisabled(disabled) {
        Array.from(scheduleRows.querySelectorAll('button, select')).forEach((el) => {
          el.disabled = disabled;
        });
        bulkCourtSelect.disabled = disabled;
        applyBulkCourtButton.disabled = disabled;
        saveAllButton.disabled = disabled || changedAssignments().length === 0;
      }

      function applyBulkCourtToAll() {
        const value = String(bulkCourtSelect.value || '');
        if (!value) {
          setStatus('Chọn sân cần gán trước.', 'error');
          return;
        }

        const nextCourt = value === 'clear' ? '' : value;
        if (nextCourt && !courtCanReceivePerformance(nextCourt)) {
          setStatus(`Sân ${nextCourt} đang là đối kháng, không gán hội diễn vào được.`, 'error');
          return;
        }

        const selects = Array.from(scheduleRows.querySelectorAll('select[data-court-select]'));
        if (!selects.length) {
          setStatus('Chưa có nội dung để gán sân.', 'error');
          return;
        }

        selects.forEach((select) => {
          select.value = nextCourt;
        });
        updateDirtyState();
        setStatus(
          nextCourt
            ? `Đã chọn tất cả nội dung vào sân ${nextCourt}. Bấm Lưu tất cả để lưu.`
            : 'Đã chọn bỏ gán tất cả nội dung. Bấm Lưu tất cả để lưu.',
          'ok'
        );
      }

      function filteredSchedules() {
        return dispatchData.schedules || [];
      }

      function courtSelect(schedule) {
        const current = String(schedule.assignedCourt || '');
        const options = [''].concat(['1', '2', '3', '4', '5', '6']).map((court) => {
          const selected = court === current ? 'selected' : '';
          const label = court ? `Sân ${court}` : 'Chưa gán';
          return `<option value="${court}" ${selected}>${label}</option>`;
        }).join('');

        return `<select data-court-select="${escapeHtml(schedule.groupId)}" data-current-court="${escapeHtml(current)}">${options}</select>`;
      }

      function renderRows() {
        const schedules = filteredSchedules();
        renderSummary();

        if (!schedules.length) {
          scheduleRows.innerHTML = '<tr><td colspan="4">Chưa có bài quyền/nội dung từ dữ liệu import.</td></tr>';
          updateDirtyState();
          return;
        }

        scheduleRows.innerHTML = schedules.map((schedule, index) => {
          const assignedCourt = String(schedule.assignedCourt || '');
          const badgeClass = assignedCourt ? 'assigned' : 'empty';

          return `
            <tr class="${assignedCourt ? 'assigned' : ''}" data-group-id="${escapeHtml(schedule.groupId)}">
              <td>${index + 1}</td>
              <td>
                <div class="name">${escapeHtml(schedule.routineName || '')}</div>
                <div class="muted">${Number(schedule.totalEntries || 0)} lượt thi</div>
              </td>
              <td><span class="badge ${badgeClass}">${escapeHtml(courtLabel(assignedCourt))}</span></td>
              <td>
                <div class="assignment-cell">
                  ${courtSelect(schedule)}
                  <button class="success" type="button" data-save-assignment="${escapeHtml(schedule.groupId)}">Lưu</button>
                </div>
              </td>
            </tr>
          `;
        }).join('');

        scheduleRows.querySelectorAll('button[data-save-assignment]').forEach((button) => {
          button.addEventListener('click', () => saveAssignment(button.dataset.saveAssignment));
        });
        scheduleRows.querySelectorAll('select[data-court-select]').forEach((select) => {
          select.addEventListener('change', updateDirtyState);
        });
        updateDirtyState();
      }

      async function loadDispatch(showOk = true) {
        const response = await fetch('/api/performance/dispatch');
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error || 'Không tải được dữ liệu chia sân.');
        }

        dispatchData = data || { courts: [], schedules: [] };
        renderRows();
        if (showOk) {
          if (dispatchData.syncError) {
            setStatus(dispatchData.syncError, 'error');
          } else if (dispatchData.sourceBatch) {
            setStatus(`Đã lấy bài quyền từ file import mới nhất: ${dispatchData.sourceBatch.fileName}.`, 'ok');
          } else {
            setStatus('Chưa có dữ liệu import. Hãy import danh sách VĐV trước.', 'error');
          }
        }
      }

      async function removeSchedule(court, groupId) {
        const response = await fetch(`/api/performance/courts/${encodeURIComponent(court)}/remove-schedule`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ groupId }),
        });
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error || 'Không bỏ gán được nội dung.');
        }
      }

      async function assignSchedule(court, groupId) {
        const response = await fetch(`/api/performance/courts/${encodeURIComponent(court)}/assign-schedule`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ groupIds: [groupId] }),
        });
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error || 'Không gán được nội dung.');
        }
      }

      async function saveAssignment(groupId) {
        const select = Array.from(scheduleRows.querySelectorAll('select[data-court-select]'))
          .find((item) => item.dataset.courtSelect === groupId);
        if (!select) return;

        const currentCourt = String(select.dataset.currentCourt || '');
        const nextCourt = String(select.value || '');

        if (currentCourt === nextCourt) {
          setStatus('Không có thay đổi để lưu.', 'ok');
          return;
        }

        if (nextCourt && !courtCanReceivePerformance(nextCourt)) {
          setStatus(`Sân ${nextCourt} đang là đối kháng, không gán hội diễn vào được.`, 'error');
          select.value = currentCourt;
          return;
        }

        try {
          setStatus('Đang lưu phân sân...');
          if (currentCourt) {
            await removeSchedule(currentCourt, groupId);
          }
          if (nextCourt) {
            await assignSchedule(nextCourt, groupId);
          }
          setScheduleAssignment(groupId, nextCourt);
          renderSummary();
          updateDirtyState();
          setStatus(nextCourt ? `Đã gán nội dung vào sân ${nextCourt}.` : 'Đã bỏ gán nội dung.', 'ok');
        } catch (error) {
          setStatus(error.message, 'error');
          select.value = currentCourt;
          updateDirtyState();
        }
      }

      async function saveAllAssignments() {
        const changes = changedAssignments();
        if (!changes.length) {
          setStatus('Không có thay đổi để lưu.', 'ok');
          return;
        }

        const invalid = changes.find((item) => item.nextCourt && !courtCanReceivePerformance(item.nextCourt));
        if (invalid) {
          setStatus(`Sân ${invalid.nextCourt} đang là đối kháng, không gán hội diễn vào được.`, 'error');
          invalid.select.value = invalid.currentCourt;
          updateDirtyState();
          return;
        }

        saveAllButton.disabled = true;
        setControlsDisabled(true);

        try {
          setStatus(`Đang lưu ${changes.length} thay đổi phân sân...`);

          for (const change of changes) {
            if (change.currentCourt) {
              await removeSchedule(change.currentCourt, change.groupId);
            }
          }

          const assignmentsByCourt = new Map();
          changes
            .filter((change) => change.nextCourt)
            .forEach((change) => {
              if (!assignmentsByCourt.has(change.nextCourt)) assignmentsByCourt.set(change.nextCourt, []);
              assignmentsByCourt.get(change.nextCourt).push(change.groupId);
            });

          for (const [court, groupIds] of assignmentsByCourt.entries()) {
            const response = await fetch(`/api/performance/courts/${encodeURIComponent(court)}/assign-schedule`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ groupIds }),
            });
            const data = await response.json();
            if (!response.ok) {
              throw new Error(data.error || `Không gán được nội dung vào sân ${court}.`);
            }
          }

          changes.forEach((change) => {
            setScheduleAssignment(change.groupId, change.nextCourt);
          });
          renderSummary();
          updateDirtyState();
          setStatus(`Đã lưu ${changes.length} thay đổi phân sân.`, 'ok');
        } catch (error) {
          setStatus(error.message, 'error');
          changes.forEach((change) => {
            change.select.value = change.currentCourt;
          });
          updateDirtyState();
        } finally {
          setControlsDisabled(false);
        }
      }

      refreshButton.addEventListener('click', () => {
        setStatus('Đang tải lại...');
        loadDispatch().catch((error) => setStatus(error.message, 'error'));
      });
      applyBulkCourtButton.addEventListener('click', applyBulkCourtToAll);
      saveAllButton.addEventListener('click', saveAllAssignments);

      loadDispatch().catch((error) => setStatus(error.message, 'error'));
    </script>
  </body>
</html>
