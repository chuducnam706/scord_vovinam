<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sân thi đấu</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Arial, sans-serif;
        background: #020617;
        color: #f8fafc;
      }

      header {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        padding: 16px 18px;
        background: #0f172a;
        border-bottom: 1px solid #334155;
      }

      h1 {
        margin: 0;
        font-size: 30px;
      }

      .muted {
        color: #94a3b8;
      }

      .status {
        align-self: center;
        padding: 8px 12px;
        border-radius: 8px;
        background: #1e293b;
        color: #e2e8f0;
        text-align: right;
      }

      main {
        display: grid;
        grid-template-columns: 1fr;
        gap: 16px;
        padding: 16px;
      }

      .panel {
        padding: 16px;
        border: 1px solid #334155;
        border-radius: 8px;
        background: #0f172a;
      }

      .panel h2 {
        margin: 0 0 12px;
        font-size: 22px;
      }

      .judge-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
      }

      a,
      button {
        display: grid;
        place-items: center;
        min-height: 76px;
        padding: 12px;
        border: 0;
        border-radius: 8px;
        background: #2563eb;
        color: #ffffff;
        font-size: 20px;
        font-weight: 800;
        text-align: center;
        text-decoration: none;
        cursor: pointer;
      }

      @media (max-width: 760px) {
        header,
        main {
          grid-template-columns: 1fr;
        }

        .judge-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div>
        <h1 id="courtTitle">Sân thi đấu</h1>
        <div class="muted" id="matchTitle">Đang tải...</div>
      </div>
      <div class="status" id="status">Đang tải</div>
    </header>

    <main>
      <section class="panel">
        <h2>Trọng tài của sân</h2>
        <div class="judge-grid" id="judgeLinks"></div>
      </section>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const court = params.get('court') || '1';
      const matchId = params.get('matchId') || `COURT_${court}`;
      const judgeLinks = document.getElementById('judgeLinks');
      const statusEl = document.getElementById('status');

      document.getElementById('courtTitle').textContent = `Sân ${court}`;
      document.getElementById('matchTitle').textContent = `Mã trận: ${matchId}`;

      function setStatus(message) {
        statusEl.textContent = message;
      }

      function renderJudgeLinks() {
        judgeLinks.innerHTML = '';

        for (let i = 1; i <= 5; i += 1) {
          const link = document.createElement('a');
          link.href = `/referee.html?court=${encodeURIComponent(court)}&matchId=${encodeURIComponent(matchId)}&judgeId=${i}`;
          link.textContent = `Trọng tài ${i}`;
          judgeLinks.appendChild(link);
        }
      }

      function renderCombatDisplay(display) {
        const current = display.currentMatch;
        if (!current) {
          setStatus('Chưa có trận');
          return;
        }
        const statusText = current.status === 'in_progress' ? 'Đang diễn ra' : current.status === 'completed' ? 'Đã kết thúc' : 'Chưa diễn ra';
        const waitingText = current.ready ? '' : ` • Còn chờ: ${(current.waitingReasons || []).join(', ')}`;
        setStatus(`Trận ${display.currentIndex + 1}/${display.totalMatches} • ${statusText}${waitingText}`);
      }

      async function loadCombatDisplay() {
        const response = await fetch(`/api/combat/courts/${encodeURIComponent(court)}/display`);
        const data = await response.json();
        renderCombatDisplay(data);
      }

      function loadCourt() {
        renderJudgeLinks();
        setStatus('Sẵn sàng');
        loadCombatDisplay().catch((error) => setStatus(error.message));
      }

      loadCourt();
    </script>
  </body>
</html>
